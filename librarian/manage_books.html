<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibManager - จัดการหนังสือ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> 
        body { font-family: 'Kanit', sans-serif; background-color: #f4f2f7; } 
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen w-full flex overflow-hidden text-slate-800">

    <aside class="w-64 bg-white flex flex-col h-full shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-20 shrink-0">
        
        <div class="h-20 flex items-center px-8 border-b border-gray-50 shrink-0">
            <a href="main.html" class="flex items-center gap-3">
                <img src="../pic/Logo_of_University_of_Phayao.svg" alt="Logo" class="w-10 h-10 object-contain">
                <h1 class="font-bold text-lg tracking-wide text-slate-800">LibManager</h1>
            </a>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto hide-scroll">
            <a href="main.html" class="flex items-center gap-3 text-gray-500 hover:bg-gray-50 hover:text-slate-700 px-4 py-3 rounded-xl font-medium text-sm transition-colors">
                <div class="w-5 text-center"><i class="fa-solid fa-border-all"></i></div> แผงควบคุม
            </a>
            <a href="check_requests.html" class="flex items-center gap-3 text-gray-500 hover:bg-gray-50 hover:text-slate-700 px-4 py-3 rounded-xl font-medium text-sm transition-colors">
                <div class="w-5 text-center"><i class="fa-solid fa-clipboard-list"></i></div> ตรวจสอบรายการ
            </a>
            <a href="approvals.html" class="flex items-center gap-3 text-gray-500 hover:bg-gray-50 hover:text-slate-700 px-4 py-3 rounded-xl font-medium text-sm transition-colors">
                <div class="w-5 text-center"><i class="fa-solid fa-right-left"></i></div> การจอง/การคืน
            </a>
            <a href="messages.html" class="flex items-center gap-3 text-gray-500 hover:bg-gray-50 hover:text-slate-700 px-4 py-3 rounded-xl font-medium text-sm transition-colors">
                <div class="w-5 text-center"><i class="fa-regular fa-comment-dots"></i></div> ข้อความ
            </a>
            <a href="#" class="flex items-center gap-3 bg-[#f3e8ff] text-purple-700 px-4 py-3 rounded-xl font-bold text-sm transition-colors">
                <div class="w-5 text-center"><i class="fa-solid fa-book"></i></div> จัดการหนังสือ
            </a>
        </nav>
        <div class="p-6">
            <button onclick="logoutLibrarian()" class="w-full flex items-center justify-center gap-2 border-2 border-red-100 text-red-500 hover:bg-red-50 font-bold py-3 rounded-xl transition-colors text-sm">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        
        <nav class="bg-white px-8 py-4 shadow-sm flex justify-between items-center z-10 shrink-0">
            <div>
                <h2 class="text-xl font-bold text-slate-800">จัดการหนังสือ</h2>
                <p class="text-xs text-gray-500">ข้อมูลหนังสือทั้งหมดในระบบ และจำนวนคงเหลือ</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="openAddModal()" class="bg-[#8b31ff] hover:bg-purple-700 text-white text-sm font-bold px-5 py-2 rounded-xl shadow-md transition-all flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> เพิ่มหนังสือใหม่
                </button>

        </nav>

        <div class="flex-1 overflow-y-auto px-8 py-8 hide-scroll">
            <div id="bookCatalogContainer" class="space-y-4 max-w-5xl pb-20"></div>
        </div>

        <div id="addBookModal" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex justify-center items-center p-4 opacity-0 transition-opacity duration-300">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="modalContent">
                
                <div class="bg-gradient-to-r from-[#8b31ff] to-[#6d28d9] p-5 text-white flex justify-between items-center shrink-0">
                    <div>
                        <h3 id="modalTitle" class="font-bold text-lg">เพิ่มหนังสือใหม่เข้าสู่ระบบ</h3>
                        <p class="text-xs text-purple-200 font-light">กรอกรายละเอียดและจำนวนเล่มที่มี</p>
                    </div>
                    <button onclick="closeAddModal()" class="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="overflow-y-auto p-6 hide-scroll flex-1">
                    <form id="addBookForm" onsubmit="saveBook(event)" class="space-y-4">
                        
                        <input type="hidden" id="inpId" value="">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">ชื่อหนังสือ (Title) <span class="text-red-500">*</span></label>
                                <input type="text" id="inpTitle" required class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">ผู้แต่ง (Author) <span class="text-red-500">*</span></label>
                                <input type="text" id="inpAuthor" required class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 text-sm">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 border-t border-gray-100 pt-4">
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">จำนวนทั้งหมด (เล่ม) <span class="text-red-500">*</span></label>
                                <input type="number" id="inpStock" required min="1" value="1" class="w-full px-4 py-2 bg-purple-50 border border-purple-200 text-purple-700 font-bold rounded-lg text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">Call Number <span class="text-red-500">*</span></label>
                                <input type="text" id="inpCallNum" required placeholder="QA76.6" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm font-mono">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">ที่ตั้ง (Floor/Zone)</label>
                                <input type="text" id="inpLocation" placeholder="Floor 3, Zone B" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">ชั้นวาง (Shelf)</label>
                                <input type="text" id="inpShelf" placeholder="A1-12" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 border-t border-gray-100 pt-4">
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">ISBN</label>
                                <input type="text" id="inpIsbn" placeholder="978-..." class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">จำนวนหน้า</label>
                                <input type="number" id="inpPages" placeholder="เช่น 350" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">ภาษา</label>
                                <input type="text" id="inpLanguage" placeholder="เช่น English" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-700">คะแนน (1-5)</label>
                                <input type="number" step="0.1" max="5" id="inpRating" placeholder="4.8" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                            </div>
                        </div>

                        <div class="space-y-1 border-t border-gray-100 pt-4">
                            <label class="text-xs font-bold text-slate-700">คำอธิบาย (Description)</label>
                            <textarea id="inpDesc" rows="2" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm" placeholder="พิมพ์คำอธิบายหนังสือ..."></textarea>
                        </div>

                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-700">ลิงก์รูปหน้าปก (Cover URL)</label>
                            <input type="url" id="inpCover" placeholder="https://..." class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                        </div>

                        <div class="pt-4 flex gap-3">
                            <button type="button" onclick="closeAddModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-slate-700 font-bold py-3 rounded-xl transition-colors text-sm">ยกเลิก</button>
                            <button type="submit" class="flex-1 bg-[#8b31ff] hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow-md transition-colors text-sm">บันทึกข้อมูล</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <script>
        const defaultBooks = [
            { 
                id: 'b1', title: 'Introduction to Algorithms', author: 'Thomas H. Cormen', 
                isbn: '978-0262046305', pages: 1312, language: 'English', rating: 4.8, 
                callNumber: 'QA76.6 .C662', location: 'Floor 3, Zone B', shelf: 'A1-12', 
                description: 'This title covers a broad range of algorithms in depth...',
                cover: 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=400&auto=format&fit=crop',
                totalStock: 3 
            },
            { 
                id: 'b2', title: "Don't Make Me Think", author: 'Steve Krug', 
                isbn: '978-0321965516', pages: 216, language: 'English', rating: 4.5, 
                callNumber: 'QA76.9 .U83', location: 'Floor 3, Zone C', shelf: 'C1-02', 
                description: 'Since Don\'t Make Me Think was first published in 2000...',
                cover: 'https://images.unsplash.com/photo-1589829085413-56de8ae18c73?q=80&w=400&auto=format&fit=crop',
                totalStock: 1 
            }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('isLibrarianLoggedIn') !== 'true') window.location.href = '../login.html';
            
            let storedBooks = JSON.parse(localStorage.getItem('libraryBooks'));
            if (!storedBooks || storedBooks.length === 0) {
                localStorage.setItem('libraryBooks', JSON.stringify(defaultBooks));
            } else {
                let updated = false;
                storedBooks.forEach(b => {
                    if(!b.totalStock) { b.totalStock = 1; updated = true; }
                });
                if(updated) localStorage.setItem('libraryBooks', JSON.stringify(storedBooks));
            }

            renderBookCatalog();
            setInterval(updateBookStatuses, 3000);
        });

        function logoutLibrarian() {
            if(confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
                localStorage.removeItem('isLibrarianLoggedIn');
                window.location.href = '../login.html';
            }
        }

        function renderBookCatalog() {
            const allBooks = JSON.parse(localStorage.getItem('libraryBooks')) || [];
            const reservations = JSON.parse(localStorage.getItem('libraryReservations')) || [];
            const activeLoans = JSON.parse(localStorage.getItem('activeLoans')) || [];
            const container = document.getElementById('bookCatalogContainer');
            container.innerHTML = '';

            if(allBooks.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 py-10 bg-white rounded-2xl border border-gray-100">ยังไม่มีหนังสือในระบบ</div>`;
                return;
            }

            allBooks.forEach(book => {
                let stockTotal = parseInt(book.totalStock || 1);
                let reservedCount = reservations.filter(r => r.id === book.id).length;
                let borrowedCount = activeLoans.filter(a => a.id === book.id).length;
                
                let usedCount = reservedCount + borrowedCount;
                let availableCount = Math.max(0, stockTotal - usedCount);
                let isUnavailable = availableCount === 0;

                let statusDot = isUnavailable ? 'bg-red-500' : 'bg-green-500';
                let statusText = isUnavailable ? 'ของหมด' : 'ว่าง';
                let statusBadgeBg = isUnavailable ? 'bg-red-50 text-red-700 border-red-200' : 'bg-green-50 text-green-700 border-green-200';

                container.innerHTML += `
                    <div id="book-card-${book.id}" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col md:flex-row md:items-center justify-between group hover:shadow-md transition-all gap-4 relative overflow-hidden">
                        
                        ${isUnavailable ? '<div class="absolute left-0 top-0 bottom-0 w-1 bg-red-400"></div>' : '<div class="absolute left-0 top-0 bottom-0 w-1 bg-green-400"></div>'}

                        <div class="flex items-center gap-5 w-full md:w-2/3 ml-2">
                            <div class="w-16 h-24 bg-gray-200 rounded-lg shadow-sm overflow-hidden shrink-0 border border-gray-100">
                                <img src="${book.cover}" class="w-full h-full object-cover ${isUnavailable ? 'grayscale' : ''}">
                            </div>
                            <div class="flex-grow">
                                <p class="text-[10px] text-gray-400 font-mono mb-0.5">ID: ${book.id}</p>
                                <h4 class="font-bold text-slate-800 text-base leading-tight mb-1">${book.title}</h4>
                                <div class="flex flex-wrap items-center gap-2 text-[10px] text-gray-500 mb-2">
                                    <span><i class="fa-regular fa-user"></i> ${book.author}</span> | 
                                    <span class="text-purple-600 font-bold bg-purple-50 px-1.5 rounded"><i class="fa-solid fa-bookmark"></i> ${book.callNumber}</span>
                                </div>
                                
                                <div class="flex gap-4">
                                    <div class="bg-gray-50 px-3 py-1 rounded-lg border border-gray-100 text-center">
                                        <p class="text-[9px] text-gray-400 uppercase tracking-wider">ทั้งหมด</p>
                                        <p class="text-sm font-bold text-slate-700">${stockTotal}</p>
                                    </div>
                                    <div class="bg-gray-50 px-3 py-1 rounded-lg border border-gray-100 text-center">
                                        <p class="text-[9px] text-gray-400 uppercase tracking-wider">ถูกยืม/จอง</p>
                                        <p class="text-sm font-bold text-yellow-600">${usedCount}</p>
                                    </div>
                                    <div class="bg-purple-50 px-3 py-1 rounded-lg border border-purple-100 text-center">
                                        <p class="text-[9px] text-purple-400 uppercase tracking-wider">ว่างให้ยืม</p>
                                        <p class="text-sm font-bold text-purple-700">${availableCount}</p>
                                    </div>
                                </div>

                            </div>
                        </div>

                        <div class="flex items-center justify-between md:justify-end gap-6 w-full md:w-1/3 border-t md:border-t-0 border-gray-50 pt-3 md:pt-0">
                            <div class="status-indicator flex items-center gap-2 text-xs font-bold px-3 py-1.5 rounded-lg border ${statusBadgeBg}">
                                <div class="w-2 h-2 rounded-full ${statusDot} shadow-sm"></div> ${statusText}
                            </div>
                            
                            <div class="flex items-center gap-3 text-gray-400">
                                <button onclick="openEditModal('${book.id}')" class="hover:text-blue-500 transition-colors flex items-center justify-center w-8 h-8 rounded-full hover:bg-blue-50" title="แก้ไขหนังสือ">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <button onclick="deleteBook('${book.id}', ${usedCount > 0})" class="hover:text-red-500 transition-colors flex items-center justify-center w-8 h-8 rounded-full hover:bg-red-50" title="ลบหนังสือ">
                                    <i class="fa-regular fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function updateBookStatuses() {
            renderBookCatalog();
        }

        const modal = document.getElementById('addBookModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');

        function openAddModal() {
            document.getElementById('addBookForm').reset();
            document.getElementById('inpId').value = ''; 
            document.getElementById('inpStock').value = 1; 
            modalTitle.textContent = "เพิ่มหนังสือใหม่เข้าสู่ระบบ";
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function openEditModal(bookId) {
            const allBooks = JSON.parse(localStorage.getItem('libraryBooks')) || [];
            const bookToEdit = allBooks.find(b => b.id === bookId);

            if(!bookToEdit) return;

            document.getElementById('inpId').value = bookToEdit.id;
            document.getElementById('inpTitle').value = bookToEdit.title;
            document.getElementById('inpAuthor').value = bookToEdit.author;
            document.getElementById('inpStock').value = bookToEdit.totalStock || 1;
            document.getElementById('inpIsbn').value = bookToEdit.isbn || '';
            document.getElementById('inpPages').value = bookToEdit.pages || '';
            document.getElementById('inpLanguage').value = bookToEdit.language || '';
            document.getElementById('inpRating').value = bookToEdit.rating || '';
            document.getElementById('inpCallNum').value = bookToEdit.callNumber || '';
            document.getElementById('inpLocation').value = bookToEdit.location || '';
            document.getElementById('inpShelf').value = bookToEdit.shelf || '';
            document.getElementById('inpDesc').value = bookToEdit.description || '';
            document.getElementById('inpCover').value = bookToEdit.cover || '';

            modalTitle.textContent = "แก้ไขข้อมูลหนังสือ";

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeAddModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('addBookForm').reset();
            }, 300);
        }

        function saveBook(event) {
            event.preventDefault();
            
            const defaultCover = 'https://images.unsplash.com/photo-1544413660-299165566b1d?q=80&w=400&auto=format&fit=crop';
            let inpCover = document.getElementById('inpCover').value.trim();
            
            const currentId = document.getElementById('inpId').value;
            const isEditing = currentId !== '';

            const bookData = {
                id: isEditing ? currentId : ('b_' + Date.now()),
                title: document.getElementById('inpTitle').value.trim(),
                author: document.getElementById('inpAuthor').value.trim(),
                totalStock: parseInt(document.getElementById('inpStock').value) || 1,
                callNumber: document.getElementById('inpCallNum').value.trim(),
                isbn: document.getElementById('inpIsbn').value.trim() || '-',
                pages: document.getElementById('inpPages').value || '-',
                language: document.getElementById('inpLanguage').value.trim() || 'Thai',
                rating: document.getElementById('inpRating').value || '0.0',
                location: document.getElementById('inpLocation').value.trim() || '-',
                shelf: document.getElementById('inpShelf').value.trim() || '-',
                description: document.getElementById('inpDesc').value.trim() || 'ไม่มีคำอธิบาย',
                cover: inpCover !== '' ? inpCover : defaultCover
            };

            let allBooks = JSON.parse(localStorage.getItem('libraryBooks')) || [];

            if(isEditing) {
                const index = allBooks.findIndex(b => b.id === currentId);
                if(index !== -1) {
                    allBooks[index] = bookData;
                }
            } else {
                allBooks.push(bookData);
            }

            localStorage.setItem('libraryBooks', JSON.stringify(allBooks));

            closeAddModal();
            renderBookCatalog();
        }

        function deleteBook(bookId, isUsed) {
            if(isUsed) {
                alert("ปฏิเสธการลบ! หนังสือเล่มนี้มีอย่างน้อย 1 เล่มที่กำลังถูกนักศึกษายืมหรือจองอยู่");
                return;
            }
            if(confirm("ยืนยันที่จะลบหนังสือเล่มนี้ออกจากระบบอย่างถาวร?")) {
                let allBooks = JSON.parse(localStorage.getItem('libraryBooks')) || [];
                allBooks = allBooks.filter(b => b.id !== bookId);
                localStorage.setItem('libraryBooks', JSON.stringify(allBooks));
                renderBookCatalog();
            }
        }
    </script>
</body>
</html>
