<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Library - แผนที่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> 
        body { font-family: 'Kanit', sans-serif; } 
        
        /* ซ่อน Scrollbar ของแจ้งเตือน */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .notif-scroll::-webkit-scrollbar { width: 4px; }
        .notif-scroll::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }

        /* อนิเมชั่นให้เส้นสีแดงวิ่งได้ */
        .path-line {
            stroke-dasharray: 20;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to {
                stroke-dashoffset: -40;
            }
        }
    </style>
</head>
<body class="bg-[#f8f9fc] min-h-screen flex flex-col">

    <nav class="bg-white px-6 py-3 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <div class="flex items-center gap-3">
                <a href="main.html" class="w-8 h-8 flex items-center justify-center text-slate-700 hover:bg-gray-100 rounded-full transition-colors mr-2">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <a href="main.html" class="flex items-center gap-3 bg-white/90 backdrop-blur-sm p-2 pr-4 rounded-xl hover:bg-gray-50 transition-colors">
                    <img src="../pic/Logo_of_University_of_Phayao.svg" alt="Logo" class="w-10 h-10 object-contain">
                    <div class="text-slate-800 leading-tight">
                        <h1 class="font-bold text-sm">UP Library</h1>
                    </div>
                </a>
            </div>
            
            <div class="flex items-center gap-3 md:gap-4">
                
                <a href="../BOOKK/cart.html" class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors relative" title="รถเข็นของฉัน">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cartBadgeCount" class="hidden absolute -top-1 -right-1 w-[18px] h-[18px] bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white">0</span>
                </a>

                <div class="relative">
                    <button id="notificationBtn" onclick="toggleNotifications()" class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors relative focus:outline-none">
                        <i class="fa-regular fa-bell"></i>
                        <span id="notificationBadge" class="hidden absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <div id="notificationDropdown" class="hidden absolute right-0 mt-3 w-80 bg-white rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] border border-gray-100 z-50 overflow-hidden transform origin-top-right transition-all">
                        <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                            <h3 class="font-bold text-slate-800 text-sm">การแจ้งเตือน</h3>
                            <button onclick="clearAllNotifications()" class="text-[11px] font-medium text-purple-600 hover:underline">ลบทั้งหมด</button>
                        </div>
                        <div id="notificationList" class="max-h-80 overflow-y-auto notif-scroll bg-white"></div>
                    </div>
                </div>

                <span id="userNameDisplay" class="text-sm text-slate-600 font-medium hidden sm:block pl-2"></span>
                
                <div class="w-10 h-10 rounded-full bg-orange-100 border-2 border-white shadow-sm overflow-hidden cursor-pointer">
                    <a href="profile.html" class="block w-full h-full">
                        <img id="navProfileImage" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=100&auto=format&fit=crop" alt="User" class="w-full h-full object-cover">
                    </a>
                </div>
            </div>
            
        </div>
    </nav>
    <main class="flex-grow w-full max-w-5xl mx-auto px-4 py-8 flex flex-col items-center justify-center">
        
        <div class="w-full text-center mb-6">
            <h2 class="text-xl md:text-2xl font-bold text-slate-800">เส้นทางรับหนังสือ</h2>
            <p class="text-sm text-gray-500">เดินตามเส้นสีแดงเพื่อไปรับหนังสือโดยยังไม่ต้องสแกนเข้าห้องสมุด</p>
        </div>

        <div class="relative w-full max-w-4xl bg-white border-[4px] border-slate-800 rounded-2xl overflow-hidden shadow-xl aspect-square md:aspect-[4/3] bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
            
            <div class="absolute top-[8%] left-[25%] w-[50%] h-[8%] bg-[#fef3c7] border-[3px] border-[#fde047] rounded-md flex items-center justify-center text-yellow-800 shadow-sm z-10">
                <span class="text-sm md:text-base font-bold tracking-wide">โต๊ะบรรณารักษ์</span>
            </div>

            <div class="absolute top-[15%] left-[8%] w-[18%] h-[5%] border-[3px] border-slate-400 bg-white rounded-sm"></div>
            <div class="absolute top-[28%] left-[8%] w-[18%] h-[5%] border-[3px] border-slate-400 bg-white rounded-sm"></div>

            <div class="absolute top-[20%] right-[5%] w-[25%] h-[20%] border-[3px] border-slate-300 bg-slate-50 opacity-70 flex items-center justify-center rounded-lg">
                <span class="text-slate-500 font-bold text-sm">โซนห้องสมุด</span>
            </div>

            <div class="absolute top-[40%] right-0 w-[65%] h-[6%] bg-[#dcfce7] border-y-[3px] border-l-[3px] border-[#86efac] flex items-center justify-center text-green-800 shadow-sm z-10">
                <span class="font-bold text-sm md:text-base">ที่สแกนเข้าห้องสมุด</span>
            </div>
            
            <div class="absolute bottom-[10%] left-0 w-[30%] h-[45%] bg-[#f3e8ff] border-t-[3px] border-r-[3px] border-b-[3px] border-[#d8b4fe] flex flex-col items-center justify-center text-purple-800 shadow-md z-10">
                <i class="fa-solid fa-hand-holding-hand text-3xl mb-2"></i>
                <span class="text-base md:text-xl font-bold text-center">รับหนังสือที่นี่</span>
            </div>

            <div class="absolute bottom-0 left-[35%] w-[30%] h-[8%] bg-white border-t-[4px] border-x-[4px] border-slate-800 flex items-center justify-center z-30">
                <span class="text-sm md:text-base font-black text-slate-800 tracking-widest">ประตู</span>
            </div>

            <svg class="absolute inset-0 w-full h-full pointer-events-none z-20" viewBox="0 0 1000 1000" preserveAspectRatio="none">
                <defs>
                    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#ee1d23" />
                    </marker>
                </defs>

                <circle cx="500" cy="920" r="15" fill="#ee1d23" />

                <path d="M 500,920 L 500,750 L 150,750" 
                      stroke="#ee1d23" stroke-width="10" fill="none" 
                      marker-end="url(#arrowhead)" class="path-line"/>
            </svg>

        </div>
    </main>

    <script>
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('libraryCart')) || [];
            const badge = document.getElementById('cartBadgeCount');
            if (cart.length > 0) { badge.textContent = cart.length; badge.classList.remove('hidden'); } 
            else { badge.classList.add('hidden'); }
        }

        function toggleNotifications() { document.getElementById('notificationDropdown').classList.toggle('hidden'); }

        function renderNotifications() {
            const notifs = JSON.parse(localStorage.getItem('libraryNotifications')) || [];
            const list = document.getElementById('notificationList');
            const badge = document.getElementById('notificationBadge');
            list.innerHTML = '';
            if(notifs.length === 0) {
                badge.classList.add('hidden');
                list.innerHTML = `<div class="p-8 text-center text-sm text-gray-400">ไม่มีการแจ้งเตือนใหม่</div>`;
                return;
            }
            badge.classList.remove('hidden');
            [...notifs].reverse().forEach(n => {
                let iconColor = n.color === 'green' ? 'bg-green-100 text-green-600' : (n.color === 'red' ? 'bg-red-100 text-red-600' : 'bg-purple-100 text-purple-600');
                list.innerHTML += `
                    <div class="px-4 py-3 border-b border-gray-50 hover:bg-gray-50 transition-colors flex gap-3 items-start relative group">
                        <div class="w-8 h-8 rounded-full ${iconColor} flex items-center justify-center shrink-0 mt-1">
                            <i class="fa-solid ${n.icon || 'fa-bell'}"></i>
                        </div>
                        <div class="flex-grow pr-4">
                            <h4 class="text-sm font-bold text-slate-800 leading-tight">${n.title}</h4>
                            <p class="text-[11px] text-gray-500 mt-1 leading-snug">${n.message}</p>
                        </div>
                        <button onclick="dismissNotification(${n.id})" class="absolute right-4 top-3 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" title="ปิดการแจ้งเตือน">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>`;
            });
        }

        function dismissNotification(id) {
            let notifs = JSON.parse(localStorage.getItem('libraryNotifications')) || [];
            notifs = notifs.filter(n => n.id !== id);
            localStorage.setItem('libraryNotifications', JSON.stringify(notifs));
            renderNotifications();
        }

        function clearAllNotifications() {
            localStorage.setItem('libraryNotifications', JSON.stringify([]));
            renderNotifications();
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = '../login.html';


            const storedUser = JSON.parse(localStorage.getItem('libraryUser'));
            if (storedUser) {
                if (storedUser.fullname) document.getElementById('userNameDisplay').textContent = 'สวัสดี, ' + storedUser.fullname.split(' ')[0];
                if (storedUser.profilePic) document.getElementById('navProfileImage').src = storedUser.profilePic;
            }


            renderNotifications();
            updateCartBadge();
        });
    </script>
</body>
</html>
