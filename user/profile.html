<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Library - โปรไฟล์ของฉัน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> 
        body { font-family: 'Kanit', sans-serif; } 
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .notif-scroll::-webkit-scrollbar { width: 4px; }
        .notif-scroll::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8f9fc] min-h-screen flex flex-col">

    <nav class="bg-white px-6 py-3 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <div class="flex items-center gap-3">
                <a href="main.html" class="w-8 h-8 flex items-center justify-center text-slate-700 hover:bg-gray-100 rounded-full transition-colors mr-2">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <a href="main.html" class="flex items-center gap-3 bg-white/90 backdrop-blur-sm p-2 pr-4 rounded-xl hover:bg-gray-50 transition-colors">
                    <img src="../pic/Logo_of_University_of_Phayao.svg" alt="Logo" class="w-10 h-10 object-contain">
                    <div class="text-slate-800 leading-tight">
                        <h1 class="font-bold text-sm">UP Library</h1>
                    </div>
                </a>
            </div>
            
            <div class="flex items-center gap-3 md:gap-4">
                
                <a href="../BOOKK/cart.html" class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors relative" title="รถเข็นของฉัน">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cartBadgeCount" class="hidden absolute -top-1 -right-1 w-[18px] h-[18px] bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white">0</span>
                </a>

                <div class="relative">
                    <button id="notificationBtn" onclick="toggleNotifications()" class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors relative focus:outline-none">
                        <i class="fa-regular fa-bell"></i>
                        <span id="notificationBadge" class="hidden absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <div id="notificationDropdown" class="hidden absolute right-0 mt-3 w-80 bg-white rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] border border-gray-100 z-50 overflow-hidden transform origin-top-right transition-all">
                        <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                            <h3 class="font-bold text-slate-800 text-sm">การแจ้งเตือน</h3>
                            <button onclick="clearAllNotifications()" class="text-[11px] font-medium text-purple-600 hover:underline">ลบทั้งหมด</button>
                        </div>
                        <div id="notificationList" class="max-h-80 overflow-y-auto notif-scroll bg-white"></div>
                    </div>
                </div>

                <span id="userNameDisplay" class="text-sm text-slate-600 font-medium hidden sm:block pl-2"></span>
                
                <div class="w-10 h-10 rounded-full bg-orange-100 border-2 border-white shadow-sm overflow-hidden cursor-pointer">
                    <a href="profile.html" class="block w-full h-full">
                        <img id="navProfileImage" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=100&auto=format&fit=crop" alt="User" class="w-full h-full object-cover">
                    </a>
                </div>

            </div>
        </div>
    </nav>
    <div class="relative w-full">
        <div class="bg-gradient-to-r from-[#9333ea] to-[#7c3aed] h-[320px] rounded-b-[3rem] w-full absolute top-0 z-0 shadow-sm"></div>
        
        <div class="relative z-10 flex flex-col items-center pt-8 text-white">
            
            <div class="relative mb-3 group cursor-pointer" onclick="document.getElementById('profilePicInput').click()">
                <div class="w-24 h-24 rounded-full border-[3px] border-white p-0.5 bg-white/20 overflow-hidden shadow-lg relative">
                    <img id="profileImage" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=100&auto=format&fit=crop" class="w-full h-full object-cover rounded-full">
                    <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center rounded-full transition-all">
                        <i class="fa-solid fa-camera text-white text-xl"></i>
                    </div>
                </div>
                <div class="absolute bottom-0 right-0 w-8 h-8 bg-white rounded-full flex items-center justify-center text-purple-600 shadow-md border border-gray-100 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-pen text-[10px]"></i>
                </div>
            </div>
            <input type="file" id="profilePicInput" accept="image/*" class="hidden" onchange="handleProfilePicUpload(event)">

            <h2 id="profileNameDisplay" class="text-xl font-bold tracking-wide">กำลังโหลด...</h2>
            <p id="profileIdDisplay" class="text-sm text-purple-100 font-light mt-0.5">ID: -------</p>

            <div class="mt-3 px-3 py-1 bg-white/20 backdrop-blur-md rounded-full text-xs font-medium flex items-center gap-2 border border-white/30 shadow-sm">
                <i class="fa-solid fa-graduation-cap"></i> University of Phayao
            </div>
        </div>
    </div>

    <div class="relative z-20 px-4 -mt-10 mb-8">
        <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-lg border border-gray-100 p-5 flex justify-between items-center text-center divide-x divide-gray-100">
            <div class="flex-1">
                <p class="text-[10px] text-gray-400 mb-1 font-medium">เคยยืมไปแล้ว</p>
                <p id="statHistory" class="text-2xl font-bold text-slate-800">0</p>
            </div>
            <div class="flex-1">
                <p class="text-[10px] text-gray-400 mb-1 font-medium">ยืมหนังสืออยู่</p>
                <p id="statBorrowed" class="text-2xl font-bold text-purple-600">0</p>
            </div>
            <div class="flex-1">
                <p class="text-[10px] text-gray-400 mb-1 font-medium">ค่าปรับ (บาท)</p>
                <p id="statFines" class="text-2xl font-bold text-red-500">0</p>
            </div>
        </div>
    </div>

    <main class="flex-grow px-4 pb-10 max-w-4xl mx-auto w-full">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

            <div class="col-span-full md:col-span-2 lg:col-span-3 pb-2 pt-2">
                <p class="text-left text-gray-400 text-xs font-bold uppercase tracking-wider ml-1">เมนูระบบ</p>
            </div>

            <div class="col-span-full md:col-span-2 lg:col-span-3">
                <button onclick="toggleSettings()" class="w-full bg-white border border-gray-100 p-4 rounded-xl flex items-center justify-between hover:shadow-md transition-shadow group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center group-hover:bg-purple-100 transition-colors">
                            <i class="fa-solid fa-gear"></i>
                        </div>
                        <div class="text-left">
                            <span class="text-sm font-bold text-slate-700 block">การตั้งค่าการแจ้งเตือน</span>
                            <span class="text-[10px] text-gray-400">จัดการวิธีการรับข้อมูลอัปเดต</span>
                        </div>
                    </div>
                    <i id="settingsIcon" class="fa-solid fa-chevron-down text-sm text-gray-400 transition-transform duration-300"></i>
                </button>

                <div id="settingsContent" class="hidden mt-3 bg-white border border-gray-100 rounded-2xl p-5 shadow-sm space-y-5 overflow-hidden">
                    
                    <div class="flex items-center justify-between pb-4 border-b border-gray-50">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center"><i class="fa-solid fa-envelope"></i></div>
                            <div>
                                <p class="text-sm font-bold text-slate-800">อีเมล (Email)</p>
                                <p class="text-[10px] text-gray-500" id="settingEmailText">student@up.ac.th</p>
                            </div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" id="toggleEmail" class="sr-only peer" onchange="saveSettings()">
                          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#8b31ff]"></div>
                        </label>
                    </div>

                    <div class="flex items-center justify-between pb-4 border-b border-gray-50">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center"><i class="fa-solid fa-comment-sms"></i></div>
                            <div>
                                <p class="text-sm font-bold text-slate-800">ข้อความ (SMS)</p>
                                <p class="text-[10px] text-gray-500">รับการแจ้งเตือนด่วนผ่านมือถือ</p>
                            </div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" id="toggleSms" class="sr-only peer" onchange="saveSettings()">
                          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#8b31ff]"></div>
                        </label>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-red-50 text-red-500 flex items-center justify-center"><i class="fa-regular fa-calendar-xmark"></i></div>
                            <div>
                                <p class="text-sm font-bold text-slate-800">แจ้งเตือนวันครบกำหนด</p>
                                <p class="text-[10px] text-gray-500">เตือนล่วงหน้า 2 วันก่อนถึงกำหนดส่ง</p>
                            </div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" id="toggleDue" class="sr-only peer" onchange="saveSettings()">
                          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#8b31ff]"></div>
                        </label>
                    </div>
                </div>
            </div>

            <a href="main.html" class="col-span-full md:col-span-2 lg:col-span-3 bg-white border border-gray-100 p-4 rounded-xl flex items-center justify-between hover:shadow-md transition-shadow group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center group-hover:bg-blue-100 transition-colors"><i class="fa-solid fa-magnifying-glass"></i></div>
                    <span class="text-sm font-bold text-slate-700">ค้นหาหนังสือ</span>
                </div>
                <i class="fa-solid fa-chevron-right text-xs text-gray-300"></i>
            </a>
        </div>

        <div class="mt-12 mb-6 flex justify-center">
            <button onclick="logout()" class="w-full max-w-sm flex items-center justify-center gap-2 py-3.5 rounded-xl bg-white border-2 border-red-100 text-red-500 hover:bg-red-50 hover:border-red-200 transition-all font-bold shadow-sm">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> ออกจากระบบ
            </button>
        </div>
    </main>

    <script>

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('libraryCart')) || [];
            const badge = document.getElementById('cartBadgeCount');
            if (cart.length > 0) { badge.textContent = cart.length; badge.classList.remove('hidden'); } 
            else { badge.classList.add('hidden'); }
        }

        function toggleNotifications() { document.getElementById('notificationDropdown').classList.toggle('hidden'); }

        function renderNotifications() {
            const notifs = JSON.parse(localStorage.getItem('libraryNotifications')) || [];
            const list = document.getElementById('notificationList');
            const badge = document.getElementById('notificationBadge');
            list.innerHTML = '';
            if(notifs.length === 0) {
                badge.classList.add('hidden');
                list.innerHTML = `<div class="p-8 text-center text-sm text-gray-400">ไม่มีการแจ้งเตือนใหม่</div>`;
                return;
            }
            badge.classList.remove('hidden');
            [...notifs].reverse().forEach(n => {
                let iconColor = n.color === 'green' ? 'bg-green-100 text-green-600' : (n.color === 'red' ? 'bg-red-100 text-red-600' : 'bg-purple-100 text-purple-600');
                list.innerHTML += `
                    <div class="px-4 py-3 border-b border-gray-50 hover:bg-gray-50 transition-colors flex gap-3 items-start relative group">
                        <div class="w-8 h-8 rounded-full ${iconColor} flex items-center justify-center shrink-0 mt-1">
                            <i class="fa-solid ${n.icon || 'fa-bell'}"></i>
                        </div>
                        <div class="flex-grow pr-4">
                            <h4 class="text-sm font-bold text-slate-800 leading-tight">${n.title}</h4>
                            <p class="text-[11px] text-gray-500 mt-1 leading-snug">${n.message}</p>
                        </div>
                        <button onclick="dismissNotification(${n.id})" class="absolute right-4 top-3 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" title="ปิดการแจ้งเตือน">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>`;
            });
        }

        function dismissNotification(id) {
            let notifs = JSON.parse(localStorage.getItem('libraryNotifications')) || [];
            notifs = notifs.filter(n => n.id !== id);
            localStorage.setItem('libraryNotifications', JSON.stringify(notifs));
            renderNotifications();
        }

        function clearAllNotifications() {
            localStorage.setItem('libraryNotifications', JSON.stringify([]));
            renderNotifications();
        }

        window.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') window.location.href = '../login.html';

            renderNotifications();
            updateCartBadge();
            loadProfileData();
            loadSettings();
        });


        function loadProfileData() {
            const storedUser = JSON.parse(localStorage.getItem('libraryUser'));
            if (storedUser) {
                if (storedUser.fullname) {
                    document.getElementById('profileNameDisplay').textContent = storedUser.fullname;
                    document.getElementById('userNameDisplay').textContent = 'สวัสดี, ' + storedUser.fullname.split(' ')[0];
                }
                if (storedUser.studentID) {
                    document.getElementById('profileIdDisplay').textContent = 'ID: ' + storedUser.studentID;
                    document.getElementById('settingEmailText').textContent = `${storedUser.studentID}@up.ac.th`;
                }


                let allUsers = JSON.parse(localStorage.getItem('allLibraryUsers')) || [];
                let userIndex = allUsers.findIndex(u => u.studentID === storedUser.studentID);
                
                if(userIndex !== -1 && allUsers[userIndex].profilePic) {
                    storedUser.profilePic = allUsers[userIndex].profilePic;
                    localStorage.setItem('libraryUser', JSON.stringify(storedUser));
                }


                if (storedUser.profilePic) {
                    document.getElementById('profileImage').src = storedUser.profilePic;
                    document.getElementById('navProfileImage').src = storedUser.profilePic;
                }


                document.getElementById('statHistory').textContent = storedUser.historyCount || 0;
                document.getElementById('statBorrowed').textContent = storedUser.borrowedCount || 0;
                
                let totalFines = parseFloat(storedUser.fines || 0);
                document.getElementById('statFines').textContent = totalFines.toFixed(2).replace(/\.00$/, '');
            }
        }


        function handleProfilePicUpload(event) {
            const file = event.target.files[0];
            if(file) {
                if(file.size > 2 * 1024 * 1024) {
                    alert("ไฟล์ภาพใหญ่เกินไป กรุณาใช้ไฟล์ขนาดไม่เกิน 2MB");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    

                    document.getElementById('profileImage').src = base64Image;
                    document.getElementById('navProfileImage').src = base64Image;
                    

                    let user = JSON.parse(localStorage.getItem('libraryUser')) || {};
                    user.profilePic = base64Image;
                    localStorage.setItem('libraryUser', JSON.stringify(user));

                    let allUsers = JSON.parse(localStorage.getItem('allLibraryUsers')) || [];
                    let userIndex = allUsers.findIndex(u => u.studentID === user.studentID);
                    if(userIndex !== -1) {
                        allUsers[userIndex].profilePic = base64Image;
                        localStorage.setItem('allLibraryUsers', JSON.stringify(allUsers));
                    }
                };
                reader.readAsDataURL(file);
            }
        }


        function toggleSettings() {
            const content = document.getElementById('settingsContent');
            const icon = document.getElementById('settingsIcon');
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }


        function saveSettings() {
            const settings = {
                email: document.getElementById('toggleEmail').checked,
                sms: document.getElementById('toggleSms').checked,
                dueAlert: document.getElementById('toggleDue').checked
            };
            localStorage.setItem('libraryUserSettings', JSON.stringify(settings));
        }


        function loadSettings() {
            const defaultSettings = { email: true, sms: false, dueAlert: true };
            const settings = JSON.parse(localStorage.getItem('libraryUserSettings')) || defaultSettings;
            document.getElementById('toggleEmail').checked = settings.email;
            document.getElementById('toggleSms').checked = settings.sms;
            document.getElementById('toggleDue').checked = settings.dueAlert;
        }

        function logout() {
            if(confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
                localStorage.removeItem('isLoggedIn');
                window.location.href = '../login.html';
            }
        }
    </script>
</body>
</html>
