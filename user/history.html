<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Library - ประวัติการยืม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Kanit', sans-serif; } </style>
</head>
<body class="bg-[#f8f9fc] min-h-screen flex flex-col">

    <nav class="bg-white px-4 py-3 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="main.html" class="w-8 h-8 flex items-center justify-center text-slate-700 hover:bg-gray-100 rounded-full transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="font-bold text-slate-800 text-lg">ประวัติการยืม</h1>
        </div>
        <div class="flex items-center gap-4">
            <button class="text-gray-500 hover:text-gray-700"><i class="fa-regular fa-bell"></i></button>
            <a href="profile.html" class="w-8 h-8 rounded-full bg-orange-100 overflow-hidden border border-gray-200">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=100&auto=format&fit=crop" class="w-full h-full object-cover">
            </a>
        </div>
    </nav>

    <div class="bg-white px-6 py-6 border-b border-gray-200">
        <div class="max-w-5xl mx-auto flex items-center gap-4">
            <div class="relative">
                <div class="w-16 h-16 rounded-full border-2 border-purple-500 p-0.5 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover rounded-full">
                </div>
                <div class="absolute -bottom-1 -right-2 bg-purple-600 text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full border border-white">UP</div>
            </div>
            <div>
                <h2 id="historyUserName" class="text-lg font-bold text-slate-800 leading-tight">กำลังโหลด...</h2>
                <p id="historyUserId" class="text-xs text-gray-500">Student ID: --------</p>
                <p class="text-[10px] text-purple-600 font-medium bg-purple-50 px-2 py-0.5 rounded-full inline-block mt-1">มหาวิทยาลัยพะเยา</p>
            </div>
        </div>
    </div>

    <div class="bg-white border-b border-gray-200 px-6">
        <div class="max-w-5xl mx-auto flex">
            <div class="flex-1 text-center py-3 border-b-2 border-purple-600 text-purple-600 font-bold text-sm cursor-default">
                ประวัติ
            </div>
        </div>
    </div>

    <main class="flex-grow w-full max-w-5xl mx-auto px-4 py-8">
        
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-slate-800">ประวัติการยืม</h3>
            <button onclick="clearAllHistory()" id="clearAllBtn" class="hidden text-xs font-bold text-red-500 hover:underline flex items-center gap-1">
                <i class="fa-solid fa-trash-can"></i> ล้างประวัติทั้งหมด
            </button>
        </div>

        <div id="historyContainer" class="space-y-4">
            </div>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') window.location.href = '../login.html';

            const storedUser = JSON.parse(localStorage.getItem('libraryUser'));
            if (storedUser) {
                if (storedUser.fullname) document.getElementById('historyUserName').textContent = storedUser.fullname;
                if (storedUser.studentID) document.getElementById('historyUserId').textContent = 'Student ID: ' + storedUser.studentID;
            }

            renderHistory();
        });

        function renderHistory() {
            const historyContainer = document.getElementById('historyContainer');
            const clearAllBtn = document.getElementById('clearAllBtn');
            let loanHistory = JSON.parse(localStorage.getItem('loanHistory')) || [];

            historyContainer.innerHTML = '';

            // ถ้าไม่มีประวัติ
            if (loanHistory.length === 0) {
                clearAllBtn.classList.add('hidden');
                historyContainer.innerHTML = `
                    <div class="bg-white rounded-xl p-10 text-center shadow-sm border border-gray-100">
                        <i class="fa-solid fa-clock-rotate-left text-4xl text-gray-300 mb-3"></i>
                        <p class="text-gray-500 font-medium">ยังไม่มีประวัติการยืมหนังสือ</p>
                    </div>
                `;
                return;
            }

            clearAllBtn.classList.remove('hidden');


            let reversedHistory = [...loanHistory].map((item, originalIndex) => {
                return { ...item, originalIndex };
            }).reverse();

            reversedHistory.forEach((book) => {
                
                let isAvailable = book.id !== 'book2'; 
                
                let statusBadge = isAvailable 
                    ? `<span class="bg-green-50 text-green-600 px-3 py-1 rounded text-[10px] font-bold">ว่าง</span>`
                    : `<span class="bg-red-50 text-red-500 px-3 py-1 rounded text-[10px] font-bold"><i class="fa-regular fa-circle-xmark mr-1"></i>ไม่ว่าง</span>`;
                
                let actionButton = isAvailable
                    ? `<a href="../BOOKK/${book.id}.html" class="bg-[#8b31ff] hover:bg-purple-700 text-white text-xs font-bold py-2 px-6 rounded-lg transition-colors flex items-center justify-center gap-2 w-full sm:w-auto"><i class="fa-solid fa-rotate"></i> จองหนังสือ</a>`
                    : `<button disabled class="bg-gray-100 text-gray-400 text-xs font-bold py-2 px-6 rounded-lg cursor-not-allowed flex items-center justify-center gap-2 w-full sm:w-auto"><i class="fa-solid fa-ban"></i> จองหนังสือ</button>`;

                // วันที่จัดเก็บ หรือถ้าไม่มีก็ใช้วันนี้จำลองไปก่อน
                let dateStr = book.cancelDate || new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                // ป้ายบอกว่านี่คือการ "ยกเลิก" หรือ "คืนแล้ว"
                let typeBadge = book.status === 'Cancelled' 
                    ? `<span class="text-[9px] bg-red-50 text-red-500 px-2 py-0.5 rounded-full inline-block mb-1">ยกเลิกการจอง</span>` 
                    : `<span class="text-[9px] bg-blue-50 text-blue-500 px-2 py-0.5 rounded-full inline-block mb-1">คืนหนังสือแล้ว</span>`;

                historyContainer.innerHTML += `
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center relative group">
                        
                        <button onclick="deleteSingleHistory(${book.originalIndex})" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 transition-colors sm:opacity-0 sm:group-hover:opacity-100" title="ลบประวัตินี้">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>

                        <div class="flex gap-4 items-start w-full sm:w-auto pr-6 sm:pr-0">
                            <div class="w-16 h-24 bg-gray-200 rounded border border-gray-100 overflow-hidden shrink-0">
                                <img src="${book.cover}" class="w-full h-full object-cover">
                            </div>
                            
                            <div class="py-1">
                                ${typeBadge}
                                <h4 class="font-bold text-slate-800 text-sm md:text-base leading-tight mt-0.5">${book.title}</h4>
                                <p class="text-[10px] text-gray-400">${book.author}</p>
                                <p class="text-[10px] text-gray-500 mt-1">Date: ${dateStr}</p>
                            </div>
                        </div>

                        <div class="flex flex-col sm:items-end gap-3 w-full sm:w-auto mt-2 sm:mt-0 border-t sm:border-t-0 border-gray-100 pt-3 sm:pt-0">
                            <div class="flex items-center gap-2 self-start sm:self-end">
                                <span class="text-[10px] font-bold text-slate-700">สถานะ :</span>
                                ${statusBadge}
                            </div>
                            ${actionButton}
                        </div>

                    </div>
                `;
            });
        }


        function deleteSingleHistory(index) {
            if(confirm("คุณแน่ใจหรือไม่ว่าต้องการลบประวัติการทำรายการนี้?")) {
                let loanHistory = JSON.parse(localStorage.getItem('loanHistory')) || [];
                

                loanHistory.splice(index, 1);
                

                localStorage.setItem('loanHistory', JSON.stringify(loanHistory));
                

                renderHistory();
            }
        }

        function clearAllHistory() {
            if(confirm("คำเตือน: คุณต้องการล้างประวัติการยืมทั้งหมดใช่หรือไม่?\nการกระทำนี้ไม่สามารถกู้คืนได้")) {
                localStorage.setItem('loanHistory', JSON.stringify([]));
                renderHistory();
            }
        }
    </script>
</body>
</html>
